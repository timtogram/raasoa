<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAASOA Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 px-6 py-3">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center gap-6">
                <a href="/dashboard" class="text-xl font-bold text-gray-900">RAASOA</a>
                <a href="/dashboard" class="text-sm text-gray-600 hover:text-gray-900 {% if active == 'home' %}font-semibold text-gray-900{% endif %}">Overview</a>
                <a href="/dashboard/documents" class="text-sm text-gray-600 hover:text-gray-900 {% if active == 'documents' %}font-semibold text-gray-900{% endif %}">Documents</a>
                <a href="/dashboard/conflicts" class="text-sm text-gray-600 hover:text-gray-900 {% if active == 'conflicts' %}font-semibold text-gray-900{% endif %}">Conflicts</a>
                <a href="/dashboard/reviews" class="text-sm text-gray-600 hover:text-gray-900 {% if active == 'reviews' %}font-semibold text-gray-900{% endif %}">Reviews</a>
            </div>
            <div class="text-xs text-gray-400">Enterprise RAG Governance</div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
