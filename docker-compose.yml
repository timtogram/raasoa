services:
  postgres:
    image: pgvector/pgvector:pg16
    platform: linux/amd64
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: raasoa
      POSTGRES_PASSWORD: raasoa_dev
      POSTGRES_DB: raasoa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raasoa"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    platform: linux/amd64
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: raasoa
      MINIO_ROOT_PASSWORD: raasoa_dev
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Pull embedding + chat models on first start, then exit
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text} &&
        ollama pull ${OLLAMA_CHAT_MODEL:-qwen3:8b} &&
        echo "Models ready"
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  # RAASOA API — starts automatically with `docker compose up -d`
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://raasoa:raasoa_dev@postgres:5432/raasoa
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: raasoa
      S3_SECRET_KEY: raasoa_dev
      S3_BUCKET: raasoa-artifacts
      EMBEDDING_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:8b}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      DASHBOARD_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  ollama_data:
